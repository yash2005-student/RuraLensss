services:
  # ─── Python GNN Model API (FastAPI) ─────────────────────────────────────────
  - type: web
    name: ruralens-gnn-api
    env: python
    region: singapore
    plan: free
    rootDir: backend/python-gnn
    buildCommand: pip install --upgrade pip && pip install -r requirements-render.txt
    startCommand: uvicorn api_server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /status
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: MODEL_PATH
        value: models/gnn_model.pt

  # ─── Backend API (Node.js) ───────────────────────────────────────────────────
  - type: web
    name: ruralens-backend
    env: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ADMIN_EMAIL
        value: admin@village.com
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        value: Administrator
      - key: PYTHON_GNN_API_URL
        value: https://ruralens-gnn-api.onrender.com

  # ─── Frontend Static Site (React/Vite) ──────────────────────────────────────
  - type: web
    name: ruralens-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://ruralens-backend.onrender.com
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
